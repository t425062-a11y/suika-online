ご希望の進化順「**クラゲ ➔ ヤドカリ ➔ ウミガメ**」の並びを完全に反映し、シャチとサメの順番入れ替え、そしてクジラが最終形態（レベル11）になるようにすべて修正した、完全版の **`index.html`** のコードです。

このコードをそのままコピー＆ペーストしてご利用いただけます。

### 📄 `index.html`（完全版）

```html
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Ocean 🌊</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(180deg, #e0f7fa 0%, #b2dfdb 100%);
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1a365d;
        }

        .lobby-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 4px solid #4dd0e1;
            border-radius: 24px;
            padding: 30px;
            width: min(90vw, 480px);
            max-height: 85vh;
            box-shadow: 0 12px 36px rgba(0, 77, 97, 0.15);
            z-index: 10;
            box-sizing: border-box;
        }

        .game-title {
            font-size: 38px;
            font-weight: bold;
            color: #00838f;
            margin: 0 0 24px 0;
            text-shadow: 2px 2px 0px #e0f7fa;
            text-align: center;
        }

        .ocean-btn-quick {
            width: 100%;
            background: linear-gradient(135deg, #0288d1 0%, #00b0ff 100%);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(2, 136, 209, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: waveMotion 3s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes waveMotion {
            0%, 100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        .custom-room-box {
            width: 100%;
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

            .custom-room-box input {
                flex: 1;
                border: 3px solid #b2ebf2;
                border-radius: 14px;
                padding: 12px;
                font-size: 16px;
                color: #1a365d;
                background: white;
                outline: none;
            }

            .custom-room-box button {
                background: #ff8a80;
                color: white;
                border: none;
                border-radius: 14px;
                padding: 0 20px;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
            }

        .lobby-subtitle {
            font-size: 16px;
            font-weight: bold;
            align-self: flex-start;
            margin: 10px 0 8px 0;
            color: #006064;
        }

        .room-list-scroll {
            width: 100%;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .room-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border: 2px solid #e0f2f1;
            border-radius: 14px;
            padding: 12px 16px;
        }

            .room-card.recruiting {
                border-color: #80cbc4;
            }

            .room-card.full {
                border-color: #cfd8dc;
                background: #f5f7f8;
                opacity: 0.7;
            }

        .room-card-btn {
            border: none;
            border-radius: 10px;
            padding: 8px 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .room-card.recruiting .room-card-btn {
            background: #26a69a;
            color: white;
        }

        .room-card.full .room-card-btn {
            background: #b0bec5;
            color: white;
            cursor: not-allowed;
        }

        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        canvas {
            width: min(95vw, 1440px);
            height: auto;
            background: #ffffff;
            border: 4px solid #333;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .back-to-lobby-btn {
            background: linear-gradient(135deg, #26a69a 0%, #00897b 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 32px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(38, 166, 154, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

            .back-to-lobby-btn:hover {
                transform: scale(1.05);
            }
    </style>
</head>
<body>

    <div id="lobby-screen" class="lobby-container">
        <h1 class="game-title">Drop Ocean 🌊</h1>
        <button id="quickMatchBtn" class="ocean-btn-quick" type="button">すぐに泳ぎにいく（クイック）</button>
        <div class="lobby-subtitle">合言葉で部屋を作る・入る</div>
        <div class="custom-room-box">
            <input id="roomInput" type="text" placeholder="部屋の名前..." value="default">
            <button id="joinButton" type="button">ダイブ</button>
        </div>
        <div class="lobby-subtitle">ただいま募集中のお部屋</div>
        <div id="roomList" class="room-list-scroll"></div>
    </div>

    <div id="game-screen">
        <canvas id="gameCanvas" width="1440" height="820"></canvas>
        <button id="backToLobbyBtn" class="back-to-lobby-btn" type="button" style="display: none;">ロビーに戻る</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const lobbyScreen = document.getElementById("lobby-screen");
        const gameScreen = document.getElementById("game-screen");
        const roomInput = document.getElementById("roomInput");
        const joinButton = document.getElementById("joinButton");
        const quickMatchBtn = document.getElementById("quickMatchBtn");
        const roomListEl = document.getElementById("roomList");
        const backToLobbyBtn = document.getElementById("backToLobbyBtn");

        let activeRoomsRawList = [];
        let isInGameMode = false;

        // 🎨 画像アセットのプリロード
        const ballImages = {};
        const obstacleImage = new Image();
        obstacleImage.src = '/images/uni.png'; // ⚠️ お邪魔ブロックはウニ

        // 🌊 ご希望に基づいた正しい進化順の画像マッピング
        const imageFiles = {
            1: 'fugu.png',      // フグ
            2: 'kurage.png',    // クラゲ
            3: 'yadokari.png',  // ヤドカリ
            4: 'kame.png',      // ウミガメ（ヤドカリの次！）
            5: 'rakko.png',     // ラッコ
            6: 'azarasi.png',   // アザラシ
            7: 'pen.png',       // ペンギン
            8: 'iruka.png',     // イルカ
            9: 'same.png',      // サメ
            10: 'shati.png',    // シャチ（サメより大きく変更！）
            11: 'kuzira.png'    // クジラ（最終形態！）
        };

        // 画像の読み込み開始
        for (const lvl in imageFiles) {
            const img = new Image();
            img.src = `/images/${imageFiles[lvl]}`;
            ballImages[lvl] = img;
        }

        function enterGameRoom(roomName) {
            myRoomId = roomName;
            isInGameMode = true;
            socket.emit("joinRoom", myRoomId);

            lobbyScreen.style.display = "none";
            gameScreen.style.display = "flex";

            resetOwnGame();
        }

        backToLobbyBtn.addEventListener("click", () => {
            socket.emit("leaveRoom", myRoomId);

            isInGameMode = false;
            lobbyScreen.style.display = "flex";
            gameScreen.style.display = "none";
            backToLobbyBtn.style.display = "none";
        });

        joinButton.addEventListener("click", () => {
            const targetRoom = roomInput.value.trim() || "default";
            enterGameRoom(targetRoom);
        });

        roomInput.addEventListener("keydown", e => {
            if (e.key === "Enter") {
                const targetRoom = roomInput.value.trim() || "default";
                enterGameRoom(targetRoom);
            }
        });

        quickMatchBtn.addEventListener("click", () => {
            const availableRoom = activeRoomsRawList.find(r => r.count === 1);
            if (availableRoom) {
                enterGameRoom(availableRoom.id);
            } else {
                const randomRoomName = "ocean-" + Math.floor(1000 + Math.random() * 9000);
                enterGameRoom(randomRoomName);
            }
        });

        function renderRoomList(list) {
            activeRoomsRawList = list || [];
            roomListEl.innerHTML = "";

            if (activeRoomsRawList.length === 0) {
                const empty = document.createElement("div");
                empty.className = "room-empty-msg";
                empty.textContent = "誰もいない静かな海です。最初の部屋を作ろう！";
                roomListEl.appendChild(empty);
                return;
            }

            for (const room of activeRoomsRawList) {
                const card = document.createElement("div");
                const isFull = room.count >= 2;
                card.className = "room-card " + (isFull ? "full" : "recruiting");

                const infoBox = document.createElement("div");
                infoBox.className = "room-card-info";

                const nameStr = document.createElement("span");
                nameStr.className = "room-card-name";
                nameStr.textContent = `🐚 部屋: ${room.id}`;

                const statusStr = document.createElement("span");
                statusStr.className = "room-card-status";
                statusStr.textContent = isFull ? `満員 (対戦中 ${room.count}/2人)` : `募集中 (待機中 ${room.count}/2人)`;

                infoBox.appendChild(nameStr);
                infoBox.appendChild(statusStr);

                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "room-card-btn";
                btn.textContent = isFull ? "満員" : "ダイブ";
                if (isFull) {
                    btn.disabled = true;
                } else {
                    btn.addEventListener("click", () => {
                        enterGameRoom(room.id);
                    });
                }

                card.appendChild(infoBox);
                card.appendChild(btn);
                roomListEl.appendChild(card);
            }
        }

        socket.on("roomList", renderRoomList);

        // ----------------------------------------------------------------
        // 🎮 ゲーム本編ロジック
        // ----------------------------------------------------------------
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;

        const PANEL_WIDTH = WIDTH / 2;
        const ENEMY_OFFSET = PANEL_WIDTH;

        const FIELD_WIDTH = Math.min(500, PANEL_WIDTH - 40);
        const FIELD_X = (PANEL_WIDTH - FIELD_WIDTH) / 2;

        const gravity = 0.75;
        const lineY = 120;

        let gameOver = false;
        let score = 0;
        let enemyState = null;
        let lastStateSentAt = 0;
        const STATE_SEND_INTERVAL = 100;

        let matchResult = null;
        let myRoomId = "default";
        let isEnemyConnectedOnce = false;

        function isMatched() {
            if (enemyState !== null) {
                isEnemyConnectedOnce = true;
                return true;
            }
            if (isEnemyConnectedOnce) return true;

            const currentRoomData = activeRoomsRawList.find(r => r.id === myRoomId);
            const counts = currentRoomData ? currentRoomData.count : 0;
            if (counts >= 2) {
                isEnemyConnectedOnce = true;
                return true;
            }
            return false;
        }

        let lastDropX = -9999;
        let samePlaceCount = 0;

        const radiuses = [0, 22, 30, 40, 52, 66, 82, 100, 122, 148, 178, 212];
        const colors = [
            "#ddd", "#ff9aa2", "#ffd97d", "#f9f871", "#8fd3ff",
            "#98f5a5", "#caa6ff", "#ff9de1", "#6fdd8b", "#ffb86b",
            "#7dd3fc", "#f472b6"
        ];

        class Ball {
            constructor(x, y, level) {
                this.x = x;
                this.y = y;
                this.level = level;
                this.radius = radiuses[level];
                this.mass = Math.pow(level, 3);
                this.vx = 0;
                this.vy = 0;
                this.isNew = true;
                this.spawnTimer = 15;
                this.isObstacle = false;
            }

            update() {
                if (this.spawnTimer > 0) this.spawnTimer--;

                this.vy += gravity;
                if (this.vy > 10) this.vy = 10;

                this.x += this.vx;
                this.y += this.vy;

                const friction = 0.92 + this.level * 0.008;
                this.vx *= friction;

                if (Math.abs(this.vx) < 0.05 && Math.abs(this.vy) < 0.05) {
                    this.vx = 0;
                    this.vy = 0;
                }

                if (this.y + this.radius > HEIGHT) {
                    this.y = HEIGHT - this.radius;
                    this.vy *= -0.05;
                    this.vx *= 0.85;
                    if (Math.abs(this.vy) < 0.1) this.vy = 0;
                }

                if (this.x - this.radius < FIELD_X) {
                    this.x = FIELD_X + this.radius;
                    this.vx *= 0.2;
                }
                if (this.x + this.radius > FIELD_X + FIELD_WIDTH) {
                    this.x = FIELD_X + FIELD_WIDTH - this.radius;
                    this.vx *= 0.2;
                }

                if (this.y > lineY + this.radius) {
                    this.isNew = false;
                }
            }

            draw() {
                ctx.save();
                if (this.isObstacle) {
                    if (obstacleImage.complete) {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                        ctx.clip();
                        ctx.drawImage(obstacleImage, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                    } else {
                        ctx.beginPath();
                        ctx.fillStyle = "#444444";
                        ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.95, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    const img = ballImages[this.level];
                    if (img && img.complete) {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                        ctx.clip();
                        ctx.drawImage(img, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                    } else {
                        ctx.beginPath();
                        ctx.fillStyle = colors[this.level];
                        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.restore();
            }
        }

        let balls = [];
        let currentX = FIELD_X + FIELD_WIDTH / 2;
        let nextLevel = randomLevel();

        function resetOwnGame() {
            balls = [];
            score = 0;
            gameOver = false;
            matchResult = null;
            nextLevel = randomLevel();
            currentX = FIELD_X + FIELD_WIDTH / 2;
            lastDropX = -9999;
            samePlaceCount = 0;
            enemyState = null;
            isEnemyConnectedOnce = false;
            backToLobbyBtn.style.display = "none";
        }

        function randomLevel() {
            const r = Math.random();
            if (r < 0.40) return 1;
            if (r < 0.75) return 2;
            if (r < 0.95) return 3;
            return 4;
        }

        function setCurrentXFromClientX(clientX) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = WIDTH / rect.width;
            let x = (clientX - rect.left) * scaleX;

            if (x < FIELD_X) x = FIELD_X;
            if (x > FIELD_X + FIELD_WIDTH) x = FIELD_X + FIELD_WIDTH;

            currentX = x;
        }

        canvas.addEventListener("mousemove", e => {
            if (isInGameMode) setCurrentXFromClientX(e.clientX);
        });

        canvas.addEventListener("touchmove", e => {
            if (isInGameMode) {
                e.preventDefault();
                setCurrentXFromClientX(e.touches[0].clientX);
            }
        }, { passive: false });

        canvas.addEventListener("touchstart", e => {
            if (isInGameMode) {
                e.preventDefault();
                setCurrentXFromClientX(e.touches[0].clientX);
                dropCurrentBall();
            }
        }, { passive: false });

        canvas.addEventListener("click", () => {
            if (isInGameMode) dropCurrentBall();
        });

        function dropCurrentBall() {
            if (gameOver) return;
            if (matchResult) return;
            if (!isMatched()) return;

            const radius = radiuses[nextLevel];
            let spawnX = currentX;

            if (spawnX < FIELD_X + radius) spawnX = FIELD_X + radius;
            if (spawnX > FIELD_X + FIELD_WIDTH - radius) spawnX = FIELD_X + FIELD_WIDTH - radius;

            if (Math.abs(spawnX - lastDropX) < 25) {
                samePlaceCount++;
            } else {
                samePlaceCount = 0;
            }

            lastDropX = spawnX;

            if (samePlaceCount >= 5) {
                const obstacleLevel = randomLevel();
                const obstacleRadius = radiuses[obstacleLevel];
                const randomX = FIELD_X + obstacleRadius + Math.random() * (FIELD_WIDTH - obstacleRadius * 2);
                const ojama = new Ball(randomX, 50, obstacleLevel);
                ojama.isObstacle = true;
                balls.push(ojama);
                samePlaceCount = 0;
            } else {
                const ball = new Ball(spawnX, 50, nextLevel);
                balls.push(ball);
            }

            nextLevel = randomLevel();
        }

        function collide(a, b) {
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const limit = (a.radius + b.radius) * 0.98;
            return (dx * dx + dy * dy < limit * limit);
        }

        function getScore(level) {
            const scores = {
                1: 10, 2: 30, 3: 60, 4: 100, 5: 200,
                6: 400, 7: 800, 8: 2000, 9: 5000, 10: 12000, 11: 30000
            };
            return scores[level] || 0;
        }

        function mergeBalls() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const a = balls[i];
                    const b = balls[j];

                    if (a.spawnTimer > 0 || b.spawnTimer > 0) continue;
                    if (!collide(a, b)) continue;

                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist === 0) continue;

                    const overlap = (a.radius + b.radius - dist) * 1.15;
                    const nx = dx / dist;
                    const ny = dy / dist;
                    const push = overlap * 0.4;

                    const totalMass = a.mass + b.mass;
                    const ratioA = b.mass / totalMass;
                    const ratioB = a.mass / totalMass;
                    a.x -= nx * push * ratioA;
                    a.y -= ny * push * ratioA;
                    b.x += nx * push * ratioB;
                    b.y += ny * push * ratioB;

                    a.vx -= nx * 0.03 * ratioA;
                    b.vx += nx * 0.03 * ratioB;

                    a.vy *= 0.92;
                    b.vy *= 0.92;

                    if (a.isObstacle || b.isObstacle) continue;

                    if (a.level === b.level) {
                        if (a.level === 11) {
                            score += 10000;
                            balls = [];
                            return;
                        }

                        const newBall = new Ball((a.x + b.x) / 2, (a.y + b.y) / 2, a.level + 1);
                        newBall.vy = -2;

                        balls.splice(j, 1);
                        balls.splice(i, 1);
                        balls.push(newBall);

                        score += getScore(newBall.level);
                        return;
                    }
                }
            }
        }

        function checkGameOver() {
            if (gameOver) return;
            for (const ball of balls) {
                if (ball.isNew) continue;

                if (ball.y > lineY && (ball.y - ball.radius) < lineY) {
                    if (Math.abs(ball.vy) < 0.5) {
                        gameOver = true;
                    }
                }
            }
        }

        function drawBackgroundDecor() {
            ctx.fillStyle = "rgba(255,255,255,0.25)";
            for (let i = 0; i < 8; i++) {
                ctx.beginPath();
                ctx.arc(60 + i * 90, 80 + (i % 2) * 40, 30, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawField() {
            ctx.fillStyle = "#fffdf4";
            ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT);
        }

        function drawLine() {
            ctx.strokeStyle = "#ff7b7b";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(FIELD_X, lineY);
            ctx.lineTo(FIELD_X + FIELD_WIDTH, lineY);
            ctx.stroke();
        }

        function drawScore() {
            ctx.fillStyle = "#fff8ee";
            ctx.fillRect(20, 20, 140, 90);
            ctx.strokeStyle = "#d8b98f";
            ctx.lineWidth = 4;
            ctx.strokeRect(20, 20, 140, 90);

            ctx.fillStyle = "#6b4f3f";
            ctx.font = "24px sans-serif";
            ctx.textAlign = "left";
            ctx.fillText("SCORE", 35, 50);

            ctx.font = "32px sans-serif";
            ctx.fillText(score, 35, 88);
        }

        function drawNext() {
            ctx.fillStyle = "#fff8ee";
            ctx.fillRect(20, 140, 140, 170);
            ctx.strokeStyle = "#d8b98f";
            ctx.lineWidth = 4;
            ctx.strokeRect(20, 140, 140, 170);

            ctx.fillStyle = "#6b4f3f";
            ctx.font = "24px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("NEXT", 90, 180);

            const r = radiuses[nextLevel] * 0.6;
            const img = ballImages[nextLevel];

            ctx.save();
            if (img && img.complete) {
                ctx.beginPath();
                ctx.arc(90, 245, r, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(img, 90 - r, 245 - r, r * 2, r * 2);
            } else {
                ctx.beginPath();
                ctx.fillStyle = colors[nextLevel];
                ctx.arc(90, 245, r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function serializeState() {
            return {
                score,
                gameOver,
                nextLevel,
                balls: balls.map(ball => ({
                    x: ball.x,
                    y: ball.y,
                    level: ball.level,
                    isObstacle: ball.isObstacle
                }))
            };
        }

        function sendGameState() {
            if (!isInGameMode) return;
            const now = performance.now();
            if (now - lastStateSentAt < STATE_SEND_INTERVAL) return;
            lastStateSentAt = now;
            socket.emit("gameState", serializeState());
        }

        socket.on("enemyState", data => {
            if (!isInGameMode) return;
            enemyState = data;

            requestAnimationFrame(() => {
                checkMatchResult();
            });
        });

        function checkMatchResult() {
            if (matchResult) return;
            if (!enemyState) return;

            if (!gameOver && enemyState.gameOver) {
                matchResult = "WIN";
                return;
            }

            if (gameOver && !enemyState.gameOver) {
                matchResult = "LOSE";
                return;
            }

            if (gameOver && enemyState.gameOver) {
                if (score > enemyState.score) {
                    matchResult = "WIN";
                } else if (score < enemyState.score) {
                    matchResult = "LOSE";
                } else {
                    matchResult = "DRAW";
                }
                return;
            }
        }

        function drawEnemyField() {
            const eFieldX = FIELD_X + ENEMY_OFFSET;
            ctx.fillStyle = "#fffdf4";
            ctx.fillRect(eFieldX, 0, FIELD_WIDTH, HEIGHT);

            ctx.strokeStyle = "#ff7b7b";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(eFieldX, lineY);
            ctx.lineTo(eFieldX + FIELD_WIDTH, lineY);
            ctx.stroke();

            ctx.fillStyle = "#fff8ee";
            ctx.fillRect(ENEMY_OFFSET + 20, 20, 140, 90);
            ctx.strokeStyle = "#d8b98f";
            ctx.lineWidth = 4;
            ctx.strokeRect(ENEMY_OFFSET + 20, 20, 140, 90);

            ctx.fillStyle = "#6b4f3f";
            ctx.font = "24px sans-serif";
            ctx.textAlign = "left";
            ctx.fillText("ENEMY", ENEMY_OFFSET + 35, 50);

            ctx.font = "32px sans-serif";
            ctx.fillText(enemyState ? (enemyState.score || 0) : 0, ENEMY_OFFSET + 35, 88);

            if (!enemyState) {
                ctx.fillStyle = "#6b4f3f";
                ctx.font = "22px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("WAITING", eFieldX + FIELD_WIDTH / 2, HEIGHT / 2);
                return;
            }

            for (const ball of enemyState.balls || []) {
                const radius = radiuses[ball.level] || 10;
                const x = eFieldX + (ball.x - FIELD_X);
                const y = ball.y;

                ctx.save();
                if (ball.isObstacle) {
                    ctx.beginPath();
                    ctx.fillStyle = "#444444";
                    ctx.ellipse(x, y, radius, radius * 0.95, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    const img = ballImages[ball.level];
                    if (img && img.complete) {
                        ctx.beginPath();
                        ctx.arc(x, y, radius, 0, Math.PI * 2);
                        ctx.clip();
                        ctx.drawImage(img, x - radius, y - radius, radius * 2, radius * 2);
                    } else {
                        ctx.beginPath();
                        ctx.fillStyle = colors[ball.level] || "#ddd";
                        ctx.arc(x, y, radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.restore();
            }

            if (enemyState.gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.55)";
                ctx.fillRect(eFieldX, 0, FIELD_WIDTH, HEIGHT);
                ctx.fillStyle = "white";
                ctx.font = "50px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", eFieldX + FIELD_WIDTH / 2, HEIGHT / 2);
            }
        }

        function drawDropPreview() {
            const r = radiuses[nextLevel];
            const img = ballImages[nextLevel];

            ctx.save();
            ctx.globalAlpha = 0.4;
            if (img && img.complete) {
                ctx.beginPath();
                ctx.arc(currentX, 50, r, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(img, currentX - r, 50 - r, r * 2, r * 2);
            } else {
                ctx.beginPath();
                ctx.fillStyle = colors[nextLevel];
                ctx.arc(currentX, 50, r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function drawDebugInfo() {
            ctx.fillStyle = "#000000";
            ctx.font = "14px monospace";
            ctx.textAlign = "left";

            let myStatus = gameOver ? "DEAD" : "ALIVE";
            let enemyStatus = "NOT CONNECTED";
            let enemyScoreText = "N/A";

            if (enemyState) {
                enemyStatus = enemyState.gameOver ? "DEAD" : "ALIVE";
                enemyScoreText = enemyState.score;
            }

            ctx.fillText(`[DEBUG] ME:${myStatus}(S:${score}) | ENEMY:${enemyStatus}(S:${enemyScoreText}) | RESULT:${matchResult || "NONE"}`, 20, HEIGHT - 20);
        }

        function update() {
            if (!isInGameMode) return;
            if (!isMatched()) return;

            if (!gameOver && !matchResult) {
                for (const ball of balls) {
                    ball.update();
                }

                for (let k = 0; k < 10; k++) {
                    mergeBalls();
                }

                checkGameOver();
                checkMatchResult();
            }

            sendGameState();
        }

        function draw() {
            if (!isInGameMode) return;
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            drawBackgroundDecor();
            drawField();
            drawLine();
            drawScore();
            drawNext();
            drawEnemyField();

            if (isMatched() && !gameOver && !matchResult) {
                drawDropPreview();
            }

            for (const ball of balls) {
                ball.draw();
            }

            if (matchResult) {
                ctx.fillStyle = "rgba(0,0,0,0.55)";
                ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT);

                ctx.textAlign = "center";
                const resultText = matchResult === "WIN" ? "YOU WIN!" : matchResult === "LOSE" ? "YOU LOSE" : "DRAW";
                ctx.fillStyle = matchResult === "WIN" ? "#ffd97d" : matchResult === "LOSE" ? "#ff9aa2" : "#ffffff";
                ctx.font = "bold 60px sans-serif";
                ctx.fillText(resultText, FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2);

                backToLobbyBtn.style.display = "block";
            }
            else if (gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.55)";
                ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT);

                ctx.textAlign = "center";
                ctx.fillStyle = "white";
                ctx.font = "45px sans-serif";
                ctx.fillText("GAME OVER", FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2 - 30);

                ctx.fillStyle = "#ffffff";
                ctx.font = "20px sans-serif";
                ctx.fillText("相手のプレイ終了を待っています...", FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2 + 40);
            }
            else if (!isMatched()) {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT);

                ctx.fillStyle = "white";
                ctx.font = "28px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("待機中...", FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2 - 16);

                ctx.font = "18px sans-serif";
                ctx.fillText("対戦相手が参加するとスタートします", FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2 + 20);
            }

            drawDebugInfo();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
