<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Ocean 🌊</title>
    <style>
        /* 全体の共通スタイル */
        body {
            margin: 0;
            background: linear-gradient(180deg, #e0f7fa 0%, #b2dfdb 100%);
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1a365d;
        }

        /* 🌊 部屋選択（ロビー）画面のスタイル */
        .lobby-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 4px solid #4dd0e1;
            border-radius: 24px;
            padding: 30px;
            width: min(90vw, 480px);
            max-height: 85vh;
            box-shadow: 0 12px 36px rgba(0, 77, 97, 0.15);
            z-index: 10;
            box-sizing: border-box;
        }

        .game-title {
            font-size: 38px;
            font-weight: bold;
            color: #00838f;
            margin: 0 0 24px 0;
            text-shadow: 2px 2px 0px #e0f7fa;
            text-align: center;
        }

        /* 波打つアニメーション付きのクイックボタン */
        .ocean-btn-quick {
            width: 100%;
            background: linear-gradient(135deg, #0288d1 0%, #00b0ff 100%);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(2, 136, 209, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: waveMotion 3s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes waveMotion {
            0%, 100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        .ocean-btn-quick:hover {
            box-shadow: 0 8px 20px rgba(2, 136, 209, 0.4);
        }

        .ocean-btn-quick:active {
            transform: scale(0.98);
        }

        /* カスタム部屋作成ボックス */
        .custom-room-box {
            width: 100%;
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

            .custom-room-box input {
                flex: 1;
                border: 3px solid #b2ebf2;
                border-radius: 14px;
                padding: 12px;
                font-size: 16px;
                color: #1a365d;
                background: white;
                outline: none;
                transition: border-color 0.2s;
            }

                .custom-room-box input:focus {
                    border-color: #00bcd4;
                }

            .custom-room-box button {
                background: #ff8a80;
                color: white;
                border: none;
                border-radius: 14px;
                padding: 0 20px;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                box-shadow: 0 4px 10px rgba(255, 138, 128, 0.3);
                transition: transform 0.2s;
            }

                .custom-room-box button:hover {
                    background: #ff5252;
                }

                .custom-room-box button:active {
                    transform: scale(0.95);
                }

        .lobby-subtitle {
            font-size: 16px;
            font-weight: bold;
            align-self: flex-start;
            margin: 10px 0 8px 0;
            color: #006064;
        }

        /* スクロール可能な部屋リスト */
        .room-list-scroll {
            width: 100%;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }

            .room-list-scroll::-webkit-scrollbar {
                width: 6px;
            }

            .room-list-scroll::-webkit-scrollbar-thumb {
                background: #b2ebf2;
                border-radius: 4px;
            }

        .room-empty-msg {
            text-align: center;
            color: #78909c;
            font-size: 14px;
            padding: 20px 0;
        }

        /* 部屋カードのデザイン */
        .room-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border: 2px solid #e0f2f1;
            border-radius: 14px;
            padding: 12px 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            transition: border-color 0.2s;
        }

            /* 状態ごとのカード色分け */
            .room-card.recruiting {
                border-color: #80cbc4;
            }

            .room-card.full {
                border-color: #cfd8dc;
                background: #f5f7f8;
                opacity: 0.7;
            }

        .room-card-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .room-card-name {
            font-weight: bold;
            font-size: 15px;
        }

        .room-card-status {
            font-size: 12px;
            font-weight: bold;
        }

        .room-card.recruiting .room-card-status {
            color: #00796b;
        }

        .room-card.full .room-card-status {
            color: #78909c;
        }

        .room-card-btn {
            border: none;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .room-card.recruiting .room-card-btn {
            background: #26a69a;
            color: white;
        }

            .room-card.recruiting .room-card-btn:hover {
                background: #00796b;
            }

            .room-card.recruiting .room-card-btn:active {
                transform: scale(0.95);
            }

        .room-card.full .room-card-btn {
            background: #b0bec5;
            color: white;
            cursor: not-allowed;
        }

        /* 🎮 ゲーム（キャンバス）画面のスタイル */
        #game-screen {
            display: none; /* 初期状態は非表示 */
        }

        canvas {
            width: min(95vw, 1440px);
            height: auto;
            background: #ffffff;
            border: 4px solid #333;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <div id="lobby-screen" class="lobby-container">
        <h1 class="game-title">Drop Ocean 🌊</h1>

        <button id="quickMatchBtn" class="ocean-btn-quick" type="button">すぐに泳ぎにいく（クイック）</button>

        <div class="lobby-subtitle">合言葉で部屋を作る・入る</div>
        <div class="custom-room-box">
            <input id="roomInput" type="text" placeholder="部屋の名前..." value="default">
            <button id="joinButton" type="button">ダイブ</button>
        </div>

        <div class="lobby-subtitle">ただいま募集中のお部屋</div>
        <div id="roomList" class="room-list-scroll"></div>
    </div>

    <div id="game-screen">
        <canvas id="gameCanvas" width="1440" height="820"></canvas>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const lobbyScreen = document.getElementById("lobby-screen");
        const gameScreen = document.getElementById("game-screen");
        const roomInput = document.getElementById("roomInput");
        const joinButton = document.getElementById("joinButton");
        const quickMatchBtn = document.getElementById("quickMatchBtn");
        const roomListEl = document.getElementById("roomList");

        let activeRoomsRawList = []; // サーバーから届いた生データを保持

        // 部屋に入室完了したときに呼ばれる画面切り替え関数
        function enterGameRoom(roomName) {
            myRoomId = roomName;
            socket.emit("joinRoom", myRoomId);

            // ロビーを消してゲーム画面を出す
            lobbyScreen.style.display = "none";
            gameScreen.style.display = "block";

            resetOwnGame();
        }

        // ダイブ（通常入室）ボタン
        joinButton.addEventListener("click", () => {
            const targetRoom = roomInput.value.trim() || "default";
            enterGameRoom(targetRoom);
        });

        roomInput.addEventListener("keydown", e => {
            if (e.key === "Enter") {
                const targetRoom = roomInput.value.trim() || "default";
                enterGameRoom(targetRoom);
            }
        });

        // クイックマッチボタンの処理
        quickMatchBtn.addEventListener("click", () => {
            // 現在1人の部屋（空き枠あり）をさがす
            const availableRoom = activeRoomsRawList.find(r => r.count === 1);
            if (availableRoom) {
                enterGameRoom(availableRoom.id);
            } else {
                // なければランダムな部屋名を自動生成して新しく作成
                const randomRoomName = "ocean-" + Math.floor(1000 + Math.random() * 9000);
                enterGameRoom(randomRoomName);
            }
        });

        // サーバーから届いたお部屋リストをカード化して描画
        function renderRoomList(list) {
            activeRoomsRawList = list || [];
            roomListEl.innerHTML = "";

            if (activeRoomsRawList.length === 0) {
                const empty = document.createElement("div");
                empty.className = "room-empty-msg";
                empty.textContent = "誰もいない静かな海です。最初の部屋を作ろう！";
                roomListEl.appendChild(empty);
                return;
            }

            for (const room of activeRoomsRawList) {
                const card = document.createElement("div");
                const isFull = room.count >= 2;

                card.className = "room-card " + (isFull ? "full" : "recruiting");

                // カード内部情報
                const infoBox = document.createElement("div");
                infoBox.className = "room-card-info";

                const nameStr = document.createElement("span");
                nameStr.className = "room-card-name";
                nameStr.textContent = `🐚 部屋: ${room.id}`;

                const statusStr = document.createElement("span");
                statusStr.className = "room-card-status";
                statusStr.textContent = isFull ? `満員 (対戦中 ${room.count}/2人)` : `募集中 (待機中 ${room.count}/2人)`;

                infoBox.appendChild(nameStr);
                infoBox.appendChild(statusStr);

                // 参加ボタン
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "room-card-btn";
                btn.textContent = isFull ? "満員" : "ダイブ";
                if (isFull) {
                    btn.disabled = true;
                } else {
                    btn.addEventListener("click", () => {
                        enterGameRoom(room.id);
                    });
                }

                card.appendChild(infoBox);
                card.appendChild(btn);
                roomListEl.appendChild(card);
            }
        }

        socket.on("roomList", renderRoomList);

        // ----------------------------------------------------------------
        // 🎮 以下、ゲーム本編のロジック
        // ----------------------------------------------------------------
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;

        const PANEL_WIDTH = WIDTH / 2;
        const ENEMY_OFFSET = PANEL_WIDTH;

        const FIELD_WIDTH = Math.min(500, PANEL_WIDTH - 40);
        const FIELD_X = (PANEL_WIDTH - FIELD_WIDTH) / 2;

        const gravity = 0.75;
        const lineY = 120;

        let gameOver = false;
        let score = 0;
        let enemyState = null;
        let lastStateSentAt = 0;
        const STATE_SEND_INTERVAL = 100;

        let matchResult = null;
        let myRoomId = "default";

        // 🌟 確実にマッチングを固定するためのフラグを追加
        let isMatchStarted = false;

        function isMatched() {
            // 既に一度ゲームが始まっている、あるいは相手のデータがある、あるいは部屋に2人以上いるならマッチしたとみなす
            if (isMatchStarted) return true;

            const currentRoomData = activeRoomsRawList.find(r => r.id === myRoomId);
            const counts = currentRoomData ? currentRoomData.count : 0;
            if (enemyState !== null || counts >= 2) {
                isMatchStarted = true; // 一度マッチしたらtrueで固定
                return true;
            }
            return false;
        }

        let lastDropX = -9999;
        let samePlaceCount = 0;

        const radiuses = [0, 22, 30, 40, 52, 66, 82, 100, 122, 148, 178, 212];
        const colors = [
            "#ddd", "#ff9aa2", "#ffd97d", "#f9f871", "#8fd3ff",
            "#98f5a5", "#caa6ff", "#ff9de1", "#6fdd8b", "#ffb86b",
            "#7dd3fc", "#f472b6"
        ];

        class Ball {
            constructor(x, y, level) {
                this.x = x;
                this.y = y;
                this.level = level;
                this.radius = radiuses[level];
                this.mass = Math.pow(level, 3);
                this.vx = 0;
                this.vy = 0;
                this.isNew = true;
                this.spawnTimer = 15;
                this.isObstacle = false;
            }

            update() {
                if (this.spawnTimer > 0) {
                    this.spawnTimer--;
                }

                this.vy += gravity;

                if (this.vy > 10) {
                    this.vy = 10;
                }

                this.x += this.vx;
                this.y += this.vy;

                const friction = 0.92 + this.level * 0.008;
                this.vx *= friction;

                if (Math.abs(this.vx) < 0.05 && Math.abs(this.vy) < 0.05) {
                    this.vx = 0;
                    this.vy = 0;
                }

                if (this.y + this.radius > HEIGHT) {
                    this.y = HEIGHT - this.radius;
                    this.vy *= -0.05;
                    this.vx *= 0.85;
                    if (Math.abs(this.vy) < 0.1) {
                        this.vy = 0;
                    }
                }

                if (this.x - this.radius < FIELD_X) {
                    this.x = FIELD_X + this.radius;
                    this.vx *= 0.2;
                }

                if (this.x + this.radius > FIELD_X + FIELD_WIDTH) {
                    this.x = FIELD_X + FIELD_WIDTH - this.radius;
                    this.vx *= 0.2;
                }

                if (this.y - this.radius > lineY) {
                    this.isNew = false;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.fillStyle = this.isObstacle ? "#444444" : colors[this.level];
                ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.95, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.fillStyle = "rgba(255,255,255,0.35)";
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.25, 0, Math.PI * 2);
                ctx.fill();

                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = `${this.radius * 0.7}px sans-serif`;

                if (this.isObstacle) {
                    ctx.fillStyle = "white";
                    ctx.fillText("X", this.x, this.y);
                } else {
                    ctx.fillStyle = "#5c4033";
                    ctx.fillText(this.level, this.x, this.y);
                }
            }
        }

        let balls = [];
        let currentX = FIELD_X + FIELD_WIDTH / 2;
        let nextLevel = randomLevel();

        function resetOwnGame() {
            balls = [];
            score = 0;
            gameOver = false;
            matchResult = null;
            nextLevel = randomLevel();
            currentX = FIELD_X + FIELD_WIDTH / 2;
            lastDropX = -9999;
            samePlaceCount = 0;
            enemyState = null;
            isMatchStarted = false; // 初期化
        }

        function randomLevel() {
            const r = Math.random();
            if (r < 0.40) return 1;
            if (r < 0.75) return 2;
            if (r < 0.95) return 3;
            return 4;
        }

        function setCurrentXFromClientX(clientX) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = WIDTH / rect.width;
            let x = (clientX - rect.left) * scaleX;

            if (x < FIELD_X) x = FIELD_X;
            if (x > FIELD_X + FIELD_WIDTH) x = FIELD_X + FIELD_WIDTH;

            currentX = x;
        }

        canvas.addEventListener("mousemove", e => {
            if (lobbyScreen.style.display === "none") setCurrentXFromClientX(e.clientX);
        });

        canvas.addEventListener("touchmove", e => {
            if (lobbyScreen.style.display === "none") {
                e.preventDefault();
                setCurrentXFromClientX(e.touches[0].clientX);
            }
        }, { passive: false });

        canvas.addEventListener("touchstart", e => {
            if (lobbyScreen.style.display === "none") {
                e.preventDefault();
                setCurrentXFromClientX(e.touches[0].clientX);
                dropCurrentBall();
            }
        }, { passive: false });

        canvas.addEventListener("click", () => {
            if (lobbyScreen.style.display === "none") dropCurrentBall();
        });

        function dropCurrentBall() {
            if (gameOver) return;
            if (!isMatched()) return;

            const radius = radiuses[nextLevel];
            let spawnX = currentX;

            if (spawnX < FIELD_X + radius) spawnX = FIELD_X + radius;
            if (spawnX > FIELD_X + FIELD_WIDTH - radius) spawnX = FIELD_X + FIELD_WIDTH - radius;

            if (Math.abs(spawnX - lastDropX) < 25) {
                samePlaceCount++;
            } else {
                samePlaceCount = 0;
            }

            lastDropX = spawnX;

            if (samePlaceCount >= 5) {
                const obstacleLevel = randomLevel();
                const obstacleRadius = radiuses[obstacleLevel];
                const randomX = FIELD_X + obstacleRadius + Math.random() * (FIELD_WIDTH - obstacleRadius * 2);
                const ojama = new Ball(randomX, 50, obstacleLevel);
                ojama.isObstacle = true;
                balls.push(ojama);
                samePlaceCount = 0;
            } else {
                const ball = new Ball(spawnX, 50, nextLevel);
                balls.push(ball);
            }

            nextLevel = randomLevel();
        }

        function collide(a, b) {
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const limit = (a.radius + b.radius) * 0.98;
            return (dx * dx + dy * dy < limit * limit);
        }

        function getScore(level) {
            const scores = {
                1: 10, 2: 30, 3: 60, 4: 100, 5: 200,
                6: 400, 7: 800, 8: 2000, 9: 5000, 10: 12000, 11: 30000
            };
            return scores[level] || 0;
        }

        function mergeBalls() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const a = balls[i];
                    const b = balls[j];

                    if (a.spawnTimer > 0 || b.spawnTimer > 0) continue;
                    if (!collide(a, b)) continue;

                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist === 0) continue;

                    const overlap = (a.radius + b.radius - dist) * 1.15;
                    const nx = dx / dist;
                    const ny = dy / dist;
                    const push = overlap * 0.4;

                    const totalMass = a.mass + b.mass;
                    const ratioA = b.mass / totalMass;
                    const ratioB = a.mass / totalMass;
                    a.x -= nx * push * ratioA;
                    a.y -= ny * push * ratioA;
                    b.x += nx * push * ratioB;
                    b.y += ny * push * ratioB;

                    a.vx -= nx * 0.03 * ratioA;
                    b.vx += nx * 0.03 * ratioB;

                    a.vy *= 0.92;
                    b.vy *= 0.92;

                    if (a.isObstacle || b.isObstacle) continue;

                    if (a.level === b.level) {
                        if (a.level === 11) {
                            score += 10000;
                            balls = [];
                            return;
                        }

                        const newBall = new Ball((a.x + b.x) / 2, (a.y + b.y) / 2, a.level + 1);
                        newBall.vy = -2;

                        balls.splice(j, 1);
                        balls.splice(i, 1);
                        balls.push(newBall);

                        score += getScore(newBall.level);
                        return;
                    }
                }
            }
        }

        function checkGameOver() {
            for (const ball of balls) {
                if (ball.isNew) continue;
                if (ball.y - ball.radius < lineY) {
                    gameOver = true;
                }
            }
        }

        function drawBackgroundDecor() {
            ctx.fillStyle = "rgba(255,255,255,0.25)";
            for (let i = 0; i < 8; i++) {
                ctx.beginPath();
                ctx.arc(60 + i * 90, 80 + (i % 2) * 40, 30, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawField() {
            ctx.fillStyle = "#fffdf4";
            ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT);
        }

        function drawLine() {
            ctx.strokeStyle = "#ff7b7b";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(FIELD_X, lineY);
            ctx.lineTo(FIELD_X + FIELD_WIDTH, lineY);
            ctx.stroke();
        }

        function drawScore() {
            ctx.fillStyle = "#fff8ee";
            ctx.fillRect(20, 20, 140, 90);
            ctx.strokeStyle = "#d8b98f";
            ctx.lineWidth = 4;
            ctx.strokeRect(20, 20, 140, 90);

            ctx.fillStyle = "#6b4f3f";
            ctx.font = "24px sans-serif";
            ctx.textAlign = "left";
            ctx.fillText("SCORE", 35, 50);

            ctx.font = "32px sans-serif";
            ctx.fillText(score, 35, 88);
        }

        function drawNext() {
            ctx.fillStyle = "#fff8ee";
            ctx.fillRect(20, 140, 140, 170);
            ctx.strokeStyle = "#d8b98f";
            ctx.lineWidth = 4;
            ctx.strokeRect(20, 140, 140, 170);

            ctx.fillStyle = "#6b4f3f";
            ctx.font = "24px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("NEXT", 90, 180);

            const r = radiuses[nextLevel] * 0.6;
            ctx.beginPath();
            ctx.fillStyle = colors[nextLevel];
            ctx.arc(90, 245, r, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#5c4033";
            ctx.font = "26px sans-serif";
            ctx.fillText(nextLevel, 90, 245);
        }

        function serializeState() {
            return {
                score,
                gameOver,
                nextLevel,
                balls: balls.map(ball => ({
                    x: ball.x,
                    y: ball.y,
                    level: ball.level,
                    isObstacle: ball.isObstacle
                }))
            };
        }

        function sendGameState() {
            if (lobbyScreen.style.display !== "none") return;
            const now = performance.now();
            if (now - lastStateSentAt < STATE_SEND_INTERVAL) {
                return;
            }
            lastStateSentAt = now;
            socket.emit("gameState", serializeState());
        }

        socket.on("enemyState", data => {
            if (lobbyScreen.style.display !== "none") return;
            enemyState = data;
            checkMatchResult();
        });

        function checkMatchResult() {
            if (matchResult) return;
            if (!enemyState) return;

            if (enemyState.gameOver && !gameOver) {
                matchResult = "WIN";
                gameOver = true;
            } else if (enemyState.gameOver && gameOver) {
                if (score > enemyState.score) {
                    matchResult = "WIN";
                } else if (score < enemyState.score) {
                    matchResult = "LOSE";
                } else {
                    matchResult = "DRAW";
                }
            } else if (!enemyState.gameOver && gameOver) {
                matchResult = "LOSE";
            }
        }

        function drawEnemyField() {
            const eFieldX = FIELD_X + ENEMY_OFFSET;
            ctx.fillStyle = "#fffdf4";
            ctx.fillRect(eFieldX, 0, FIELD_WIDTH, HEIGHT);

            ctx.strokeStyle = "#ff7b7b";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(eFieldX, lineY);
            ctx.lineTo(eFieldX + FIELD_WIDTH, lineY);
            ctx.stroke();

            ctx.fillStyle = "#fff8ee";
            ctx.fillRect(ENEMY_OFFSET + 20, 20, 140, 90);
            ctx.strokeStyle = "#d8b98f";
            ctx.lineWidth = 4;
            ctx.strokeRect(ENEMY_OFFSET + 20, 20, 140, 90);

            ctx.fillStyle = "#6b4f3f";
            ctx.font = "24px sans-serif";
            ctx.textAlign = "left";
            ctx.fillText("ENEMY", ENEMY_OFFSET + 35, 50);

            ctx.font = "32px sans-serif";
            ctx.fillText(enemyState ? (enemyState.score || 0) : 0, ENEMY_OFFSET + 35, 88);

            if (!enemyState) {
                ctx.fillStyle = "#6b4f3f";
                ctx.font = "22px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("WAITING", eFieldX + FIELD_WIDTH / 2, HEIGHT / 2);
                return;
            }

            for (const ball of enemyState.balls || []) {
                const radius = radiuses[ball.level] || 10;
                const x = eFieldX + (ball.x - FIELD_X);
                const y = ball.y;

                ctx.beginPath();
                ctx.fillStyle = ball.isObstacle ? "#444444" : colors[ball.level] || "#ddd";
                ctx.ellipse(x, y, radius, radius * 0.95, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = `${radius * 0.7}px sans-serif`;

                if (ball.isObstacle) {
                    ctx.fillStyle = "white";
                    ctx.fillText("X", x, y);
                } else {
                    ctx.fillStyle = "#5c4033";
                    ctx.fillText(ball.level, x, y);
                }
            }

            if (enemyState.gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.55)";
                ctx.fillRect(eFieldX, 0, FIELD_WIDTH, HEIGHT);
                ctx.fillStyle = "white";
                ctx.font = "50px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", eFieldX + FIELD_WIDTH / 2, HEIGHT / 2);
            }
        }

        function drawDropPreview() {
            const r = radiuses[nextLevel];
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.fillStyle = colors[nextLevel];
            ctx.arc(currentX, 50, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        function update() {
            if (lobbyScreen.style.display !== "none") return;
            if (gameOver) return;
            if (!isMatched()) return;

            for (const ball of balls) {
                ball.update();
            }

            for (let k = 0; k < 10; k++) {
                mergeBalls();
            }

            checkGameOver();
            checkMatchResult();
            sendGameState();
        }

        function draw() {
            if (lobbyScreen.style.display !== "none") return;
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            drawBackgroundDecor();
            drawField();
            drawLine();
            drawScore();
            drawNext();
            drawEnemyField();

            if (isMatched()) {
                drawDropPreview();
            }

            for (const ball of balls) {
                ball.draw();
            }

            // 🌟 修正箇所：勝敗条件（matchResult）がある場合は isMatched の状態にかかわらず最優先で描画
            if (matchResult) {
                ctx.fillStyle = "rgba(0,0,0,0.55)";
                ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT);

                ctx.textAlign = "center";
                const resultText = matchResult === "WIN" ? "YOU WIN!" : matchResult === "LOSE" ? "YOU LOSE" : "DRAW";
                ctx.fillStyle = matchResult === "WIN" ? "#ffd97d" : matchResult === "LOSE" ? "#ff9aa2" : "#ffffff";
                ctx.font = "bold 60px sans-serif";
                ctx.fillText(resultText, FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2);
            }
            // まだ勝敗は決まっていないが、自分だけがゲームオーバーした時
            else if (gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.55)";
                ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT);

                ctx.textAlign = "center";
                ctx.fillStyle = "white";
                ctx.font = "50px sans-serif";
                ctx.fillText("GAME OVER", FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2 - 30);

                if (enemyState && !enemyState.gameOver) {
                    ctx.fillStyle = "#ffffff";
                    ctx.font = "22px sans-serif";
                    ctx.fillText("相手のプレイ中...", FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2 + 40);
                }
            }
            // まだマッチングしていない（待機中）とき
            else if (!isMatched()) {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT);

                ctx.fillStyle = "white";
                ctx.font = "28px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("待機中...", FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2 - 16);

                ctx.font = "18px sans-serif";
                ctx.fillText("対戦相手が参加するとスタートします", FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2 + 20);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
