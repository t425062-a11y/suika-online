<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Ocean 🌊</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(180deg, #fff6d6 0%, #ffd9ec 100%);
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1a365d;
        }
        .lobby-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 4px solid #4dd0e1;
            border-radius: 24px;
            padding: 30px;
            width: min(90vw, 480px);
            max-height: 85vh;
            box-shadow: 0 12px 36px rgba(0, 77, 97, 0.15);
            z-index: 10;
            box-sizing: border-box;
        }
        .game-title {
            font-size: 38px;
            font-weight: bold;
            color: #00838f;
            margin: 0 0 24px 0;
            text-shadow: 2px 2px 0px #e0f7fa;
            text-align: center;
        }
        .ocean-btn-quick {
            width: 100%;
            background: linear-gradient(135deg, #0288d1 0%, #00b0ff 100%);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(2, 136, 209, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: waveMotion 3s ease-in-out infinite;
            margin-bottom: 20px;
        }
        @keyframes waveMotion {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .custom-room-box {
            width: 100%;
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .custom-room-box input {
            flex: 1;
            border: 3px solid #b2ebf2;
            border-radius: 14px;
            padding: 12px;
            font-size: 16px;
            color: #1a365d;
            background: white;
            outline: none;
        }
        .custom-room-box button {
            background: #ff8a80;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .lobby-subtitle {
            font-size: 16px;
            font-weight: bold;
            align-self: flex-start;
            margin: 10px 0 8px 0;
            color: #006064;
        }
        .room-list-scroll {
            width: 100%;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .room-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border: 2px solid #e0f2f1;
            border-radius: 14px;
            padding: 12px 16px;
        }
        .room-card.recruiting { border-color: #80cbc4; }
        .room-card.full {
            border-color: #cfd8dc;
            background: #f5f7f8;
            opacity: 0.7;
        }
        .room-card-btn {
            border: none;
            border-radius: 10px;
            padding: 8px 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .room-card.recruiting .room-card-btn { background: #26a69a; color: white; }
        .room-card.full .room-card-btn { background: #b0bec5; color: white; cursor: not-allowed; }
        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        canvas {
            width: min(95vw, 1440px);
            height: auto;
            background: #ffffff;
            border: 4px solid #333;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .back-to-lobby-btn {
            background: linear-gradient(135deg, #26a69a 0%, #00897b 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 32px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(38, 166, 154, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .back-to-lobby-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="lobby-screen" class="lobby-container">
        <h1 class="game-title">Drop Ocean 🌊</h1>
        <button id="quickMatchBtn" class="ocean-btn-quick" type="button">すぐに泳ぎにいく（クイック）</button>
        <div class="lobby-subtitle">合言葉で部屋を作る・入る</div>
        <div class="custom-room-box">
            <input id="roomInput" type="text" placeholder="部屋の名前..." value="default">
            <button id="joinButton" type="button">ダイブ</button>
        </div>
        <div class="lobby-subtitle">ただいま募集中のお部屋</div>
        <div id="roomList" class="room-list-scroll"></div>
    </div>
    <div id="game-screen">
        <canvas id="gameCanvas" width="1440" height="820"></canvas>
        <button id="backToLobbyBtn" class="back-to-lobby-btn" type="button" style="display: none;">ロビーに戻る</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const lobbyScreen = document.getElementById("lobby-screen");
        const gameScreen = document.getElementById("game-screen");
        const roomInput = document.getElementById("roomInput");
        const joinButton = document.getElementById("joinButton");
        const quickMatchBtn = document.getElementById("quickMatchBtn");
        const roomListEl = document.getElementById("roomList");
        const backToLobbyBtn = document.getElementById("backToLobbyBtn");

        let activeRoomsRawList = [];
        let isInGameMode = false;
        let myId = null; // 自分の通信ID

        socket.on("yourSocketId", id => { myId = id; });

        const seaImages = {};
        const seaImageUrls = {
            1: "images/yadokari.png", 2: "images/kurage.png", 3: "images/fugu.png", 4: "images/rakko.png",
            5: "images/pen.png", 6: "images/iruka.png", 7: "images/azarasi.png", 8: "images/kame.png",
            9: "images/same.png", 10: "images/shati.png", 11: "images/kuzira.png"
        };
        for (let level = 1; level <= 11; level++) {
            const img = new Image();
            img.src = seaImageUrls[level];
            seaImages[level] = img;
        }
        const obstacleImage = new Image();
        obstacleImage.src = "images/uni.png";

        let audioCtx = null;
        function unlockAudio() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === "suspended") { audioCtx.resume(); }
        }
        function playMergeSound(level) {
            unlockAudio();
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "triangle";
            osc.frequency.setValueAtTime(220 + level * 45, t);
            osc.frequency.exponentialRampToValueAtTime(120 + level * 20, t + 0.12);
            gain.gain.setValueAtTime(0.12, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + 0.15);
        }

        function enterGameRoom(roomName) {
            myRoomId = roomName; isInGameMode = true;
            socket.emit("joinRoom", myRoomId);
            lobbyScreen.style.display = "none"; gameScreen.style.display = "flex";
            resetOwnGame();
        }

        backToLobbyBtn.addEventListener("click", () => {
            socket.emit("leaveRoom", myRoomId);
            isInGameMode = false; lobbyScreen.style.display = "flex"; gameScreen.style.display = "none"; backToLobbyBtn.style.display = "none";
        });

        joinButton.addEventListener("click", () => { const targetRoom = roomInput.value.trim() || "default"; enterGameRoom(targetRoom); });
        roomInput.addEventListener("keydown", e => { if (e.key === "Enter") { const targetRoom = roomInput.value.trim() || "default"; enterGameRoom(targetRoom); } });
        quickMatchBtn.addEventListener("click", () => {
            const availableRoom = activeRoomsRawList.find(r => r.count === 1);
            if (availableRoom) { enterGameRoom(availableRoom.id); }
            else { enterGameRoom("ocean-" + Math.floor(1000 + Math.random() * 9000)); }
        });

        function renderRoomList(list) {
            activeRoomsRawList = list || []; roomListEl.innerHTML = "";
            if (activeRoomsRawList.length === 0) {
                const empty = document.createElement("div"); empty.textContent = "誰もいない静かな海です。最初の部屋を作ろう！"; roomListEl.appendChild(empty); return;
            }
            for (const room of activeRoomsRawList) {
                const card = document.createElement("div"); const isFull = room.count >= 2;
                card.className = "room-card " + (isFull ? "full" : "recruiting");
                const infoBox = document.createElement("div");
                const nameStr = document.createElement("span"); nameStr.textContent = `🐚 部屋: ${room.id}`;
                const statusStr = document.createElement("span"); statusStr.textContent = isFull ? "満員" : "募集中";
                infoBox.appendChild(nameStr); infoBox.appendChild(statusStr);
                const btn = document.createElement("button"); btn.textContent = isFull ? "満員" : "ダイブ";
                if (isFull) { btn.disabled = true; } else { btn.addEventListener("click", () => enterGameRoom(room.id)); }
                card.appendChild(infoBox); card.appendChild(btn); roomListEl.appendChild(card);
            }
        }
        socket.on("roomList", renderRoomList);

        const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
        const WIDTH = canvas.width; const HEIGHT = canvas.height;
        const PANEL_WIDTH = WIDTH / 2; const ENEMY_OFFSET = PANEL_WIDTH;
        const FIELD_WIDTH = 500; const FIELD_X = 190;
        const gravity = 0.75; const lineY = 120;

        let gameOver = false; let score = 0; let enemyState = null; let lastStateSentAt = 0; let gameOverGraceTimer = 0;
        const STATE_SEND_INTERVAL = 100; let matchResult = null; let myRoomId = "default";
        let isEnemyConnectedOnce = false; let lastDropX = -9999; let samePlaceCount = 0;

        let visionBlurTimer = 0; let maxVisionBlur = 180;
        let lockInputTimer = 0; let maxLockInput = 120;
        let cutInTimer = 0; let cutInLevel = 0; let cutInType = "MY_SKILL"; let shakeTimer = 0;
        let enemyOjamaVisuals = [];

        const radiuses = [0, 22, 30, 40, 52, 66, 82, 100, 122, 148, 178, 212];
        const colors = ["#ddd", "#ff9aa2", "#ffd97d", "#f9f871", "#8fd3ff", "#98f5a5", "#caa6ff", "#ff9de1", "#6fdd8b", "#ffb86b", "#7dd3fc", "#f472b6"];

        function isMatched() {
            if (enemyState !== null) { isEnemyConnectedOnce = true; return true; }
            if (isEnemyConnectedOnce) return true;
            const currentRoomData = activeRoomsRawList.find(r => r.id === myRoomId);
            if (currentRoomData && currentRoomData.count >= 2) { isEnemyConnectedOnce = true; return true; }
            return false;
        }

        function addPenalty(count, forcedRelativeX = null) {
            for (let i = 0; i < count; i++) {
                const level = Math.random() < 0.5 ? 3 : 4; const radius = radiuses[level];
                const rel = (forcedRelativeX !== null) ? forcedRelativeX : Math.random();
                const x = FIELD_X + radius + rel * (FIELD_WIDTH - radius * 2);
                const ball = new Ball(x, 40, level); ball.isObstacle = true; balls.push(ball);
            }
            shakeTimer = 15;
        }

        function activateSkill(level) {
            if (level !== 6 && level !== 8 && level !== 10 && level !== 11) return;
            
            // 自分の画面にカットインを出す
            cutInTimer = 60; cutInLevel = level; cutInType = "MY_SKILL";

            const randomRelX = Math.random();
            if (level === 6) {
                socket.emit("triggerSkill", { type: "penalty", count: 1, level: 6, relativeX: randomRelX });
                enemyOjamaVisuals.push({ relX: randomRelX, currentY: -20, targetY: 120, speed: 6, timer: 45 });
            }
            if (level === 8) { socket.emit("triggerSkill", { type: "blur", duration: 180, level: 8 }); }
            if (level === 10) { socket.emit("triggerSkill", { type: "lock", duration: 120, level: 10 }); }
            if (level === 11) {
                socket.emit("triggerSkill", { type: "penalty", count: 4, level: 11, relativeX: randomRelX });
                for(let i=0; i<4; i++) { enemyOjamaVisuals.push({ relX: Math.random(), currentY: -20-(i*25), targetY: 120, speed: 6, timer: 55 }); }
            }
        }

        // 強固になったスキル受信リスナー
        socket.on("receiveSkill", (skill) => {
            if (!isInGameMode || gameOver || matchResult) return;
            
            // 自分が放ったスキルの通知なら無視、相手が放ったものなら喰らう！
            if (skill.senderId === myId) return;

            if (skill.level === 6 || skill.level === 8 || skill.level === 10 || skill.level === 11) {
                cutInTimer = 60; cutInLevel = skill.level; cutInType = "ENEMY_SKILL";
            }
            if (skill.type === "blur") { visionBlurTimer = skill.duration; maxVisionBlur = skill.duration; }
            if (skill.type === "lock") { lockInputTimer = skill.duration; maxLockInput = skill.duration; }
            if (skill.type === "penalty") { addPenalty(skill.count, skill.relativeX); }
        });

        class Ball {
            constructor(x, y, level) {
                this.x = x; this.y = y; this.level = level; this.radius = radiuses[level];
                this.mass = Math.pow(level, 3); this.vx = 0; this.vy = 0; this.isNew = true;
                this.spawnTimer = 15; this.isObstacle = false;
            }
            update() {
                if (this.spawnTimer > 0) this.spawnTimer--;
                this.vy += gravity; if (this.vy > 10) this.vy = 10;
                this.x += this.vx; this.y += this.vy;
                const friction = 0.92 + this.level * 0.008; this.vx *= friction;
                if (Math.abs(this.vx) < 0.05 && Math.abs(this.vy) < 0.05) { this.vx = 0; this.vy = 0; }
                if (this.y + this.radius > HEIGHT) {
                    this.y = HEIGHT - this.radius; this.vy *= -0.05; this.vx *= 0.85;
                    if (Math.abs(this.vy) < 0.1) this.vy = 0;
                }
                if (this.x - this.radius < FIELD_X) { this.x = FIELD_X + this.radius; this.vx *= 0.2; }
                if (this.x + this.radius > FIELD_X + FIELD_WIDTH) { this.x = FIELD_X + FIELD_WIDTH - this.radius; this.vx *= 0.2; }
                if (this.y - this.radius > lineY) { this.isNew = false; }
            }
            draw() {
                const img = this.isObstacle ? obstacleImage : seaImages[this.level];
                const useImage = img && img.complete && img.naturalWidth > 0;
                ctx.save();
                if (useImage) {
                    ctx.beginPath(); ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.95, 0, 0, Math.PI * 2); ctx.clip();
                    ctx.drawImage(img, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                    ctx.restore(); ctx.beginPath(); ctx.fillStyle = "rgba(255,255,255,0.25)";
                    ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.25, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = "rgba(0,0,0,0.15)"; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.95, 0, 0, Math.PI * 2); ctx.stroke();
                } else {
                    ctx.beginPath(); ctx.fillStyle = this.isObstacle ? "#444444" : colors[this.level];
                    ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.95, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.fillStyle = "rgba(255,255,255,0.35)";
                    ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.25, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                }
                if (this.isObstacle && !useImage) {
                    ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.font = `${this.radius * 0.7}px sans-serif`;
                    ctx.fillStyle = "white"; ctx.fillText("X", this.x, this.y);
                }
            }
        }

        let balls = []; let currentX = FIELD_X + FIELD_WIDTH / 2; let nextLevel = randomLevel();
        // 手元のフルーツを管理する変数を追加
        let currentHandLevel = 1;

        function resetOwnGame() {
            balls = []; 
            score = 0; 
            gameOver = false; 
            matchResult = null; 
            // スタート時に「手元」と「NEXT」をそれぞれ別々に抽選する
            currentHandLevel = randomLevel();
            nextLevel = randomLevel();
            currentX = FIELD_X + FIELD_WIDTH / 2; 
            lastDropX = -9999; 
            samePlaceCount = 0; 
            enemyState = null; 
            isEnemyConnectedOnce = false;
            visionBlurTimer = 0; 
            lockInputTimer = 0; 
            cutInTimer = 0; 
            shakeTimer = 0; 
            enemyOjamaVisuals = []; 
            backToLobbyBtn.style.display = "none";
        }
        function randomLevel() { const r = Math.random(); if (r < 0.40) return 1; if (r < 0.75) return 2; if (r < 0.95) return 3; return 4; }
        
        function setCurrentXFromClientX(clientX) {
            const rect = canvas.getBoundingClientRect(); const scaleX = WIDTH / rect.width; let x = (clientX - rect.left) * scaleX;
            if (x < FIELD_X) x = FIELD_X; if (x > FIELD_X + FIELD_WIDTH) x = FIELD_X + FIELD_WIDTH; currentX = x;
        }
        canvas.addEventListener("mousemove", e => { if (isInGameMode) setCurrentXFromClientX(e.clientX); });
        canvas.addEventListener("click", () => { if (isInGameMode) dropCurrentBall(); });

        function dropCurrentBall() {
            unlockAudio(); if (gameOver || matchResult || !isMatched()) return; if (lockInputTimer > 0) return;
            
            // 1. まず、今セットされている 'nextLevel' を「今落とすフルーツのレベル」として変数に固定する
            const currentLevel = nextLevel;
            const radius = radiuses[currentLevel]; let spawnX = currentX;
            if (spawnX < FIELD_X + radius) spawnX = FIELD_X + radius; if (spawnX > FIELD_X + FIELD_WIDTH - radius) spawnX = FIELD_X + FIELD_WIDTH - radius;
            if (Math.abs(spawnX - lastDropX) < 30) { samePlaceCount++; } else { samePlaceCount = 0; }
            lastDropX = spawnX;

            if (samePlaceCount >= 3) {
                const obstacleLevel = randomLevel(); const obstacleRadius = radiuses[obstacleLevel];
                const randomX = FIELD_X + obstacleRadius + Math.random() * (FIELD_WIDTH - obstacleRadius * 2);
                const ojama = new Ball(randomX, 50, obstacleLevel); ojama.isObstacle = true; balls.push(ojama); samePlaceCount = 0;
                
                // ペナルティの時も、手元のフルーツを消費した扱いにするためにNEXTを新しく抽選
                nextLevel = randomLevel();
            } else {
                // 2. 固定したレベルでフルーツを落とす
                const ball = new Ball(spawnX, 50, currentLevel); balls.push(ball);
                
                // 3. 落とし終わった後に、未来のフルーツ（本当のNEXT）を新しく抽選する
                nextLevel = randomLevel();
            }
        }

        function collide(a, b) { const dx = b.x - a.x; const dy = b.y - a.y; const dist = Math.sqrt(dx * dx + dy * dy); return dist < (a.radius + b.radius) * 1.08; }
        function getScore(level) { const scores = { 1: 10, 2: 30, 3: 60, 4: 100, 5: 200, 6: 400, 7: 800, 8: 2000, 9: 5000, 10: 12000, 11: 30000 }; return scores[level] || 0; }

        function mergeBalls() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const a = balls[i]; const b = balls[j];
                    if (a.spawnTimer > 0 || b.spawnTimer > 0 || !collide(a, b)) continue;
                    const dx = b.x - a.x; const dy = b.y - a.y; const dist = Math.sqrt(dx * dx + dy * dy); if (dist === 0) continue;
                    const overlap = (a.radius + b.radius - dist) * 1.15; const nx = dx / dist; const ny = dy / dist; const push = overlap * 0.4;
                    const totalMass = a.mass + b.mass; const ratioA = b.mass / totalMass; const ratioB = a.mass / totalMass;
                    a.x -= nx * push * ratioA; a.y -= ny * push * ratioA; b.x += nx * push * ratioB; b.y += ny * push * ratioB;
                    a.vx -= nx * 0.03 * ratioA; b.vx += nx * 0.03 * ratioB; a.vy *= 0.92; b.vy *= 0.92;
                    if (a.isObstacle || b.isObstacle) continue;
                    if (a.level === b.level) {
                        if (a.level === 11) { score += 10000; balls = []; return; }
                        playMergeSound(a.level + 1);
                        const newBall = new Ball((a.x + b.x) / 2, (a.y + b.y) / 2, a.level + 1); newBall.vy = -2;
                        balls.splice(j, 1); balls.splice(i, 1); balls.push(newBall);
                        score += getScore(newBall.level);
                        activateSkill(newBall.level); 
                        return;
                    }
                }
            }
        }

        function checkGameOver() {
            // 試合がすでに決している場合は何もしない
            if (gameOver || matchResult) return;

            let isViolating = false;
            for (const ball of balls) {
                // 落としたて（上空にいる間）や、生まれて間もないものは判定から完全に除外
                if (ball.isNew || ball.spawnTimer > 0 || ball.y < lineY) continue;
                
                // ボールの「てっぺん」が赤い線より上にあるか
                if (ball.y - ball.radius < lineY) {
                    // さらに、下方向への勢いが止まっている（積み上がっている）かチェック
                    if (Math.abs(ball.vy) < 0.5) {
                        isViolating = true;
                        break;
                    }
                }
            }

            if (isViolating) {
                gameOverGraceTimer++;
                // 赤い線の上に1.5秒（約90フレーム）以上留まり続けたら本当にゲームオーバー
                if (gameOverGraceTimer > 90) {
                    gameOver = true;
                }
            } else {
                // 線から下がればタイマーリセット
                gameOverGraceTimer = 0;
            }
        }
        function drawBackgroundDecor() { ctx.fillStyle = "rgba(255,255,255,0.25)"; for (let i = 0; i < 16; i++) { ctx.beginPath(); ctx.arc(60 + (i%8) * 90 + (i>=8?ENEMY_OFFSET:0), 80 + (i % 2) * 40, 30, 0, Math.PI * 2); ctx.fill(); } }
        function drawField() { ctx.fillStyle = "#fffdf4"; ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT); }
        function drawLine() { ctx.strokeStyle = "#ff7b7b"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(FIELD_X, lineY); ctx.lineTo(FIELD_X + FIELD_WIDTH, lineY); ctx.stroke(); }
        function drawScore() { ctx.fillStyle = "#fff8ee"; ctx.fillRect(20, 20, 140, 90); ctx.strokeStyle = "#d8b98f"; ctx.lineWidth = 4; ctx.strokeRect(20, 20, 140, 90); ctx.fillStyle = "#6b4f3f"; ctx.font = "24px sans-serif"; ctx.textAlign = "left"; ctx.fillText("SCORE", 35, 50); ctx.font = "32px sans-serif"; ctx.fillText(score, 35, 88); }
        
        function drawNext() {
            ctx.fillStyle = "#fff8ee"; ctx.fillRect(20, 140, 140, 170); ctx.strokeStyle = "#d8b98f"; ctx.lineWidth = 4; ctx.strokeRect(20, 140, 140, 170);
            ctx.fillStyle = "#6b4f3f"; ctx.font = "24px sans-serif"; ctx.textAlign = "center"; ctx.fillText("NEXT", 90, 180);
            const r = radiuses[nextLevel] * 0.6; const img = seaImages[nextLevel];
            const useImage = img && img.complete && img.naturalWidth > 0;
            ctx.save(); if (useImage) { ctx.beginPath(); ctx.arc(90, 245, r, 0, Math.PI * 2); ctx.clip(); ctx.drawImage(img, 90 - r, 245 - r, r * 2, r * 2); } else { ctx.beginPath(); ctx.fillStyle = colors[nextLevel]; ctx.arc(90, 245, r, 0, Math.PI * 2); ctx.fill(); } ctx.restore();
            if (useImage) { ctx.beginPath(); ctx.strokeStyle = "rgba(0,0,0,0.12)"; ctx.lineWidth = 2; ctx.arc(90, 245, r, 0, Math.PI * 2); ctx.stroke(); }
        }

                function drawDropPreview() {
            if (lockInputTimer > 0) return;
            
            // 【超重要】今手元にある本物のレベル（currentHandLevel）を毎フレーム100%強制同期
            const targetLvl = (typeof currentHandLevel !== 'undefined') ? currentHandLevel : 1;
            const r = radiuses[targetLvl] || 22; 
            const img = seaImages[targetLvl];
            const useImage = img && img.complete && img.naturalWidth > 0;
            
            ctx.save(); 
            ctx.globalAlpha = 0.3; // うっすら透明
            
            if (useImage) { 
                ctx.beginPath(); 
                ctx.arc(currentX, 50, r, 0, Math.PI * 2); 
                ctx.clip(); 
                ctx.drawImage(img, currentX - r, 50 - r, r * 2, r * 2); 
            } else { 
                ctx.beginPath(); 
                ctx.fillStyle = colors[targetLvl] || "#ff9aa2"; 
                ctx.arc(currentX, 50, r, 0, Math.PI * 2); 
                ctx.fill(); 
            }
            ctx.restore();
            
            if (visionBlurTimer > 0) {
                ctx.fillStyle = "rgba(255,255,255,0.75)"; ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT);
                ctx.fillStyle = "rgba(0,180,216,0.15)"; ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT);
            }
            ctx.globalAlpha = 1;
        }

        function drawTimers() {
            let startY = 340;
            if (visionBlurTimer > 0) {
                ctx.fillStyle = "#6b4f3f"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "left"; ctx.fillText("🔮 視界異常", 20, startY);
                ctx.fillStyle = "#e0e0e0"; ctx.fillRect(20, startY + 8, 140, 10);
                ctx.fillStyle = "#0288d1"; ctx.fillRect(20, startY + 8, 140 * (visionBlurTimer / maxVisionBlur), 10); startY += 40;
            }
            if (lockInputTimer > 0) {
                ctx.fillStyle = "#ff5252"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "left"; ctx.fillText("🔒 操作不能", 20, startY);
                ctx.fillStyle = "#e0e0e0"; ctx.fillRect(20, startY + 8, 140, 10);
                ctx.fillStyle = "#ff1744"; ctx.fillRect(20, startY + 8, 140 * (lockInputTimer / maxLockInput), 10);
            }
        }

        function serializeState() { return { score, gameOver, nextLevel, currentHandLevel, visionBlurTimer, lockInputTimer, cutInTimer, cutInLevel, cutInType, balls: balls.map(b => ({ x: b.x, y: b.y, level: b.level, isObstacle: b.isObstacle })) }; }
        function sendGameState() { if (!isInGameMode) return; const now = performance.now(); if (now - lastStateSentAt < STATE_SEND_INTERVAL) return; lastStateSentAt = now; socket.emit("gameState", serializeState()); }
        socket.on("enemyState", data => { if (!isInGameMode) return; enemyState = data; requestAnimationFrame(() => checkMatchResult()); });

        function checkMatchResult() {
            if (matchResult || !enemyState) return;
            if (!gameOver && enemyState.gameOver) { matchResult = "WIN"; return; }
            if (gameOver && !enemyState.gameOver) { matchResult = "LOSE"; return; }
            if (gameOver && enemyState.gameOver) {
                if (score > enemyState.score) matchResult = "WIN"; else if (score < enemyState.score) matchResult = "LOSE"; else matchResult = "DRAW";
            }
        }

        function drawEnemyField() {
            const eFieldX = FIELD_X + ENEMY_OFFSET; ctx.fillStyle = "#fffdf4"; ctx.fillRect(eFieldX, 0, FIELD_WIDTH, HEIGHT);
            ctx.strokeStyle = "#ff7b7b"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(eFieldX, lineY); ctx.lineTo(eFieldX + FIELD_WIDTH, lineY); ctx.stroke();
            ctx.fillStyle = "#fff8ee"; ctx.fillRect(ENEMY_OFFSET + 20, 20, 140, 90); ctx.strokeStyle = "#d8b98f"; ctx.lineWidth = 4; ctx.strokeRect(ENEMY_OFFSET + 20, 20, 140, 90);
            ctx.fillStyle = "#6b4f3f"; ctx.font = "24px sans-serif"; ctx.textAlign = "left"; ctx.fillText("ENEMY", ENEMY_OFFSET + 35, 50); ctx.font = "32px sans-serif"; ctx.fillText(enemyState ? (enemyState.score || 0) : 0, ENEMY_OFFSET + 35, 88);
            if (!enemyState) { ctx.fillStyle = "#6b4f3f"; ctx.font = "22px sans-serif"; ctx.textAlign = "center"; ctx.fillText("WAITING", eFieldX + FIELD_WIDTH / 2, HEIGHT / 2); return; }
            
            for (const ball of enemyState.balls || []) {
                const radius = radiuses[ball.level] || 10; const x = eFieldX + (ball.x - FIELD_X); const y = ball.y;
                const img = ball.isObstacle ? obstacleImage : seaImages[ball.level];
                const useImage = img && img.complete && img.naturalWidth > 0;
                ctx.save();
                if (useImage) { ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.clip(); ctx.drawImage(img, x - radius, y - radius, radius * 2, radius * 2); }
                else { ctx.beginPath(); ctx.fillStyle = ball.isObstacle ? "#444444" : colors[ball.level] || "#ddd"; ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill(); }
                ctx.restore();
            }

            for (let i = enemyOjamaVisuals.length - 1; i >= 0; i--) {
                const vis = enemyOjamaVisuals[i]; const uniX = eFieldX + (FIELD_WIDTH * vis.relX);
                ctx.save(); ctx.strokeStyle = "rgba(255, 23, 68, 0.4)"; ctx.lineWidth = 3; ctx.setLineDash([6, 6]);
                ctx.beginPath(); ctx.moveTo(uniX, 0); ctx.lineTo(uniX, HEIGHT); ctx.stroke(); ctx.restore();

                const radius = 32; ctx.save();
                if (obstacleImage.complete && obstacleImage.naturalWidth > 0) { ctx.beginPath(); ctx.arc(uniX, vis.currentY, radius, 0, Math.PI * 2); ctx.clip(); ctx.drawImage(obstacleImage, uniX - radius, vis.currentY - radius, radius * 2, radius * 2); }
                else { ctx.beginPath(); ctx.fillStyle = "#ff1744"; ctx.arc(uniX, vis.currentY, radius, 0, Math.PI * 2); ctx.fill(); }
                ctx.restore();

                ctx.fillStyle = "#ff1744"; ctx.font = "bold 20px sans-serif"; ctx.textAlign = "center"; ctx.fillText("⚠️", uniX, Math.max(25, vis.currentY - 45));
                vis.currentY += vis.speed; vis.timer--; if (vis.timer <= 0 || vis.currentY > HEIGHT) { enemyOjamaVisuals.splice(i, 1); }
            }
            if (enemyState.visionBlurTimer > 0) { ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fillRect(eFieldX, 0, FIELD_WIDTH, HEIGHT); }
            if (enemyState.gameOver) { ctx.fillStyle = "rgba(0,0,0,0.55)"; ctx.fillRect(eFieldX, 0, FIELD_WIDTH, HEIGHT); ctx.fillStyle = "white"; ctx.font = "50px sans-serif"; ctx.textAlign = "center"; ctx.fillText("GAME OVER", eFieldX + FIELD_WIDTH / 2, HEIGHT / 2); }
        }

        function drawCutInEffect() {
            let currentTimer = cutInTimer; let currentLevel = cutInLevel; let currentType = cutInType;
            if (currentTimer <= 0 && enemyState && enemyState.cutInTimer > 0) {
                if (enemyState.cutInLevel === 6 || enemyState.cutInLevel === 8 || enemyState.cutInLevel === 10 || enemyState.cutInLevel === 11) {
                    currentTimer = enemyState.cutInTimer; currentLevel = enemyState.cutInLevel;
                    currentType = enemyState.cutInType === "MY_SKILL" ? "ENEMY_SKILL" : "MY_SKILL";
                }
            }
            if (currentTimer <= 0) return;

            ctx.save(); ctx.fillStyle = currentType === "MY_SKILL" ? "rgba(0, 180, 216, 0.85)" : "rgba(230, 57, 70, 0.9)"; ctx.fillRect(0, HEIGHT / 2 - 80, WIDTH, 160);
            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(0, HEIGHT / 2 - 80); ctx.lineTo(WIDTH, HEIGHT / 2 - 80); ctx.moveTo(0, HEIGHT / 2 + 80); ctx.lineTo(WIDTH, HEIGHT / 2 + 80); ctx.stroke();

            let skillName = "💥 ATTACK!";
            if (currentLevel === 6) skillName = "🐬 イルカ・ストライク (ウニ+1)";
            if (currentLevel === 8) skillName = "🐢 カメ・カモフラージュ (視界ブレ)";
            if (currentLevel === 10) skillName = "🦈 シャチ・バインド (操作不能)";
            if (currentLevel === 11) skillName = "🐋 クジラ・タイダルウェーブ (ウニ+4)";

            ctx.fillStyle = "#ffffff"; ctx.shadowColor = "rgba(0,0,0,0.4)"; ctx.shadowBlur = 6; ctx.font = "italic bold 28px sans-serif"; ctx.textAlign = "center";

            if (currentType === "MY_SKILL") {
                ctx.fillText("スキル発動!!", WIDTH * 0.25, HEIGHT / 2 - 25); ctx.font = "bold 34px sans-serif"; ctx.fillText(skillName, WIDTH * 0.25, HEIGHT / 2 + 30);
            } else {
                ctx.fillText("⚠️ 警告!! 敵の妨害スキル", WIDTH * 0.75, HEIGHT / 2 - 25); ctx.font = "bold 34px sans-serif"; ctx.fillText(skillName, WIDTH * 0.75, HEIGHT / 2 + 30);
            }

            const img = seaImages[currentLevel];
            if (img && img.complete && img.naturalWidth > 0) {
                const targetX = currentType === "MY_SKILL" ? WIDTH * 0.25 + 280 : WIDTH * 0.75 - 280;
                ctx.beginPath(); ctx.arc(targetX, HEIGHT / 2, 70, 0, Math.PI * 2); ctx.clip(); ctx.drawImage(img, targetX - 70, HEIGHT / 2 - 70, 140, 140);
            }
            ctx.restore();
        }

        function drawDebugInfo() { ctx.fillStyle = "#000000"; ctx.font = "14px monospace"; ctx.textAlign = "left"; let myStatus = gameOver ? "DEAD" : "ALIVE"; let enemyStatus = enemyState ? (enemyState.gameOver ? "DEAD" : "ALIVE") : "NOT CONNECTED"; ctx.fillText(`[DEBUG] ME:${myStatus}(S:${score}) | ENEMY:${enemyStatus} | RESULT:${matchResult || "NONE"}`, 20, HEIGHT - 20); }

        function update() {
            if (visionBlurTimer > 0) visionBlurTimer--; if (lockInputTimer > 0) lockInputTimer--; if (cutInTimer > 0) cutInTimer--;
            if (!isInGameMode || !isMatched()) return;
            if (!gameOver && !matchResult) { for (const ball of balls) ball.update(); for (let k = 0; k < 10; k++) mergeBalls(); checkGameOver(); checkMatchResult(); }
            sendGameState();
        }

        function draw() {
            if (!isInGameMode) return; ctx.save();
            if (shakeTimer > 0) { ctx.translate((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10); shakeTimer--; }
            ctx.clearRect(0, 0, WIDTH, HEIGHT); drawBackgroundDecor(); drawField(); drawLine(); drawScore(); drawNext(); drawEnemyField();
            if (isMatched() && !gameOver && !matchResult) drawDropPreview();
            drawTimers(); for (const ball of balls) ball.draw(); drawCutInEffect();

            if (matchResult) {
                ctx.fillStyle = "rgba(0,0,0,0.55)"; ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT); ctx.textAlign = "center";
                const resultText = matchResult === "WIN" ? "YOU WIN!" : matchResult === "LOSE" ? "YOU LOSE" : "DRAW";
                ctx.fillStyle = matchResult === "WIN" ? "#ffd97d" : matchResult === "LOSE" ? "#ff9aa2" : "#ffffff";
                ctx.font = "bold 60px sans-serif"; ctx.fillText(resultText, FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2); backToLobbyBtn.style.display = "block";
            } else if (gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.55)"; ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT); ctx.textAlign = "center"; ctx.fillStyle = "white"; ctx.font = "45px sans-serif"; ctx.fillText("GAME OVER", FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2 - 30);
                ctx.font = "20px sans-serif"; ctx.fillText("相手のプレイ終了を待っています...", FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2 + 40);
            } else if (!isMatched()) {
                ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(FIELD_X, 0, FIELD_WIDTH, HEIGHT); ctx.fillStyle = "white"; ctx.font = "28px sans-serif"; ctx.textAlign = "center"; ctx.fillText("待機中...", FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2 - 16);
                ctx.font = "18px sans-serif"; ctx.fillText("対戦相手が参加するとスタートします", FIELD_X + FIELD_WIDTH / 2, HEIGHT / 2 + 20);
            }
            drawDebugInfo(); ctx.restore();
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
